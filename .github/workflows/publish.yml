name: Publish

# Publishes to npm when a GitHub Release is published. Cut a release whose tag
# matches the package.json version (e.g. package.json 0.2.0 → tag v0.2.0), and
# this runs the checks and publishes cad-preview@<version> to npm.
#
# Auth is tokenless via npm Trusted Publishing (OIDC): npm is configured to trust
# this repo's publish.yml workflow, so no NPM_TOKEN secret is needed. Requires
# id-token: write and npm >= 11.5.1 (we upgrade npm below). Provenance is emitted
# automatically.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC) needs a recent npm; setup-node ships an older one.
      - run: npm install -g npm@latest

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build

      - name: Verify package.json version matches the release tag
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json version ($PKG) != release tag ($TAG)"
            exit 1
          fi

      # No NODE_AUTH_TOKEN: OIDC exchanges the workflow identity for a short-lived
      # npm credential. --provenance is automatic under trusted publishing.
      - run: npm publish --access public
